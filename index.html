<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TwoFeeds — Campaign Ops</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f4f2f8;
      --surface: #ffffff;
      --surface2: #ede9f7;
      --border: #d9d3ec;
      --accent: #5c2d91;
      --text: #1a0f2e;
      --muted: #7a6d96;
      --live: #1e8a5e;
      --paused: #b06a00;
      --ended: #b02a4a;
      --font-mono: 'Space Mono', monospace;
      --font-display: 'Syne', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(92,45,145,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(92,45,145,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

    /* HEADER */
    header { padding: 24px 0 0; border-bottom: 1px solid var(--border); position: relative; z-index: 1; }

    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 16px; padding-bottom: 16px;
    }

    .logo { display: flex; align-items: center; gap: 14px; }

    .logo-icon {
      width: 48px; height: 48px; background: #5c2d91; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; box-shadow: 0 4px 16px rgba(92,45,145,0.25); flex-shrink: 0;
    }

    .logo-icon img { width: 80%; height: 80%; object-fit: contain; }
    .logo h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .logo span { font-size: 12px; color: var(--muted); font-family: var(--font-mono); display: block; margin-top: 1px; }

    .header-right { display: flex; align-items: center; gap: 12px; }

    .refresh-btn {
      background: var(--surface); border: 1px solid var(--border); color: var(--muted);
      padding: 8px 16px; border-radius: 8px; font-family: var(--font-mono);
      font-size: 11px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--surface2); }

    .last-sync { font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-align: right; line-height: 1.8; }
    .countdown { display: block; font-size: 10px; color: var(--accent); opacity: 0.75; }

    /* NAV */
    .nav-bar { display: flex; }

    .nav-tab {
      padding: 12px 28px; font-family: var(--font-mono); font-size: 11px;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
      cursor: pointer; border: none; background: transparent;
      border-bottom: 3px solid transparent; transition: all 0.2s; position: relative; bottom: -1px;
    }
    .nav-tab:hover { color: var(--accent); }
    .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }

    /* PAGES */
    .page { display: none; }
    .page.active { display: block; }

    /* STATS */
    .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; padding: 28px 0; border-bottom: 1px solid var(--border); }

    .stat {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 20px 24px; position: relative; overflow: hidden; animation: fadeUp 0.4s ease both;
    }
    .stat:nth-child(1) { animation-delay: 0.05s; }
    .stat:nth-child(2) { animation-delay: 0.1s; }
    .stat:nth-child(3) { animation-delay: 0.15s; }
    .stat::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
    .stat.live-stat::before { background: var(--live); }
    .stat.paused-stat::before { background: var(--paused); }
    .stat.ended-stat::before { background: var(--ended); }
    .stat-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
    .stat-value { font-size: 40px; font-weight: 800; line-height: 1.1; font-family: Arial, Helvetica, sans-serif; }
    .stat.live-stat .stat-value { color: var(--live); }
    .stat.paused-stat .stat-value { color: var(--paused); }
    .stat.ended-stat .stat-value { color: var(--ended); }

    /* CONTROLS */
    .controls { padding: 20px 0 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    .filter-btn {
      padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-family: var(--font-mono);
      font-size: 11px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em;
    }
    .filter-btn:hover, .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .search-wrap { margin-left: auto; position: relative; }
    .search-wrap input {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 14px 8px 36px; color: var(--text); font-family: var(--font-mono);
      font-size: 12px; width: 220px; outline: none; transition: border-color 0.2s;
    }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 13px; }

    /* TABLE */
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 40px; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--surface2); border-bottom: 1px solid var(--border); }
    th { padding: 14px 20px; text-align: left; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); font-weight: 400; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; animation: fadeUp 0.35s ease both; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    td { padding: 16px 20px; font-size: 14px; vertical-align: middle; }
    .campaign-id { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
    .campaign-name { font-weight: 600; font-size: 15px; }
    .status-wrap { display: flex; align-items: center; gap: 8px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.live { background: var(--live); box-shadow: 0 0 6px var(--live); }
    .status-dot.paused { background: var(--paused); }
    .status-dot.ended { background: var(--ended); }
    .status-select { background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--font-mono); font-size: 11px; padding: 4px 8px; cursor: pointer; outline: none; transition: border-color 0.2s; }
    .status-select:hover, .status-select:focus { border-color: var(--accent); }
    .status-select option { background: var(--surface2); }
    .notes-input { background: transparent; border: 1px solid transparent; border-radius: 6px; color: var(--muted); font-family: var(--font-display); font-size: 12px; padding: 4px 8px; width: 180px; outline: none; transition: all 0.2s; }
    .notes-input:hover { border-color: var(--border); color: var(--text); }
    .notes-input:focus { border-color: var(--accent); color: var(--text); background: var(--surface2); }
    .updated-cell { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }

    .save-indicator { display: inline-flex; align-items: center; gap: 5px; font-family: var(--font-mono); font-size: 10px; padding: 3px 10px; border-radius: 20px; opacity: 0; transition: opacity 0.3s; }
    .save-indicator.saving { background: rgba(92,45,145,0.1); color: var(--accent); border: 1px solid rgba(92,45,145,0.2); opacity: 1; }
    .save-indicator.saved { background: rgba(30,138,94,0.1); color: var(--live); border: 1px solid rgba(30,138,94,0.2); opacity: 1; }
    .save-indicator.error { background: rgba(176,42,74,0.1); color: var(--ended); border: 1px solid rgba(176,42,74,0.2); opacity: 1; }

    .loading-row td, .empty-row td { text-align: center; padding: 60px; color: var(--muted); font-family: var(--font-mono); font-size: 12px; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 10px; }
    .add-row td { padding: 12px 20px; background: var(--surface2); }
    .add-btn { background: transparent; border: 1px dashed var(--border); color: var(--muted); padding: 8px 20px; border-radius: 8px; font-family: var(--font-mono); font-size: 11px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em; }
    .add-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* TASKS */
    .tasks-header { padding: 28px 0 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .tasks-title { font-size: 20px; font-weight: 800; }
    .tasks-stats { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 4px; }

    .task-input-row { display: flex; gap: 10px; padding: 20px 0; border-bottom: 1px solid var(--border); }
    .task-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-family: var(--font-display); font-size: 14px; outline: none; transition: border-color 0.2s; }
    .task-input:focus { border-color: var(--accent); }
    .task-input::placeholder { color: var(--muted); }
    .task-add-btn { background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 12px 24px; font-family: var(--font-mono); font-size: 11px; font-weight: 700; cursor: pointer; letter-spacing: 0.05em; transition: opacity 0.2s; white-space: nowrap; }
    .task-add-btn:hover { opacity: 0.85; }

    .tasks-filter-row { display: flex; gap: 8px; padding: 16px 0 8px; }
    .task-list { margin-bottom: 40px; }

    .task-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; margin-bottom: 8px; display: flex; align-items: center; gap: 14px; transition: all 0.2s; animation: fadeUp 0.3s ease both; }
    .task-item:hover { border-color: var(--accent); }
    .task-item.done { opacity: 0.5; }
    .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }

    .task-check { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 6px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-size: 12px; }
    .task-check:hover { border-color: var(--accent); background: var(--surface2); }
    .task-item.done .task-check { background: var(--live); border-color: var(--live); color: white; }

    .task-text { flex: 1; font-size: 14px; line-height: 1.4; }
    .task-date { font-family: var(--font-mono); font-size: 10px; color: var(--muted); white-space: nowrap; }
    .task-delete { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; transition: all 0.2s; opacity: 0; }
    .task-item:hover .task-delete { opacity: 1; }
    .task-delete:hover { color: var(--ended); background: rgba(176,42,74,0.08); }
    .tasks-empty { text-align: center; padding: 60px; color: var(--muted); font-family: var(--font-mono); font-size: 12px; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 440px; max-width: 95vw; transform: translateY(20px); transition: transform 0.2s; }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal h2 { font-size: 18px; font-weight: 800; margin-bottom: 24px; }
    .modal label { display: block; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .modal input, .modal select, .modal textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--font-display); font-size: 14px; padding: 10px 14px; outline: none; margin-bottom: 18px; transition: border-color 0.2s; }
    .modal input:focus, .modal select:focus, .modal textarea:focus { border-color: var(--accent); }
    .modal textarea { resize: vertical; min-height: 80px; }
    .modal select option { background: var(--surface2); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
    .btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 10px 20px; border-radius: 8px; font-family: var(--font-mono); font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .btn-cancel:hover { border-color: var(--text); color: var(--text); }
    .btn-save { background: var(--accent); border: none; color: #fff; padding: 10px 24px; border-radius: 8px; font-family: var(--font-mono); font-size: 12px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; letter-spacing: 0.05em; }
    .btn-save:hover { opacity: 0.85; }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

    /* STRATEGY GATE */
    .gate-wrap {
      max-width: 420px; margin: 80px auto; text-align: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 48px 40px;
    }
    .gate-icon { font-size: 40px; margin-bottom: 16px; }
    .gate-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    .gate-sub { color: var(--muted); font-size: 13px; margin-bottom: 28px; font-family: var(--font-mono); }
    .gate-input-row { display: flex; gap: 10px; }
    .gate-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px; color: var(--text);
      font-family: var(--font-mono); font-size: 13px; outline: none;
      transition: border-color 0.2s; letter-spacing: 0.1em;
    }
    .gate-input:focus { border-color: var(--accent); }
    .gate-error { color: var(--ended); font-family: var(--font-mono); font-size: 11px; margin-top: 12px; min-height: 16px; }

    /* NOTES */
    .note-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px 22px; margin-bottom: 12px;
      animation: fadeUp 0.3s ease both; position: relative;
    }
    .note-item:hover { border-color: var(--accent); }
    .note-item:hover .task-delete { opacity: 1; }
    .note-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .note-title {
      font-weight: 700; font-size: 14px; background: transparent;
      border: none; outline: none; color: var(--text); font-family: var(--font-display);
      width: 80%;
    }
    .note-title::placeholder { color: var(--muted); }
    .note-body {
      width: 100%; background: transparent; border: none; outline: none;
      color: var(--text); font-family: var(--font-display); font-size: 13px;
      line-height: 1.6; resize: none; min-height: 80px;
    }
    .note-body::placeholder { color: var(--muted); }
    .note-date { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 10px; }
    .note-saved { font-family: var(--font-mono); font-size: 10px; color: var(--live); margin-top: 4px; opacity: 0; transition: opacity 0.3s; }
    .note-saved.show { opacity: 1; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 700px) {
      .stats-bar { grid-template-columns: repeat(3, 1fr); }
      th:nth-child(1), td:nth-child(1) { display: none; }
      .notes-input { width: 120px; }
      .nav-tab { padding: 10px 16px; font-size: 10px; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">
          <img src="TF.jpg" alt="TF" onerror="this.style.display='none'; this.parentElement.innerHTML='<span style=\'font-size:18px;font-weight:800;color:white;\'>TF</span>'"/>
        </div>
        <div>
          <h1>TwoFeeds</h1>
          <span>campaign ops dashboard</span>
        </div>
      </div>
      <div class="header-right" id="campaignControls">
        <span class="last-sync" id="lastSync">—<span class="countdown" id="countdown"></span></span>
        <div class="save-indicator" id="saveIndicator"></div>
        <button class="refresh-btn" onclick="manualRefresh()">↻ REFRESH</button>
      </div>
    </div>
    <nav class="nav-bar">
      <button class="nav-tab active" onclick="showPage('campaigns', this)">📊 Campaigns</button>
      <button class="nav-tab" onclick="showPage('tasks', this)">✅ Tasks</button>
      <button class="nav-tab" onclick="showPage('strategy', this)">🔒 Strategy</button>
    </nav>
  </header>

  <!-- CAMPAIGNS PAGE -->
  <div class="page active" id="page-campaigns">
    <div class="stats-bar">
      <div class="stat live-stat">
        <div class="stat-label">● Live</div>
        <div class="stat-value" id="countLive">—</div>
      </div>
      <div class="stat paused-stat">
        <div class="stat-label">⏸ Paused</div>
        <div class="stat-value" id="countPaused">—</div>
      </div>
      <div class="stat ended-stat">
        <div class="stat-label">✕ Ended</div>
        <div class="stat-value" id="countEnded">—</div>
      </div>
    </div>
    <div class="controls">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('Live', this)">Live</button>
      <button class="filter-btn" onclick="setFilter('Paused', this)">Paused</button>
      <button class="filter-btn" onclick="setFilter('Ended', this)">Ended</button>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search campaigns..." id="searchInput" oninput="renderTable()"/>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th><th>Campaign</th><th>Status</th><th>Notes</th><th>Last Updated</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr class="loading-row"><td colspan="5"><div class="spinner"></div><br/>Loading campaigns...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- TASKS PAGE -->
  <div class="page" id="page-tasks">
    <div class="tasks-header">
      <div>
        <div class="tasks-title">Team Tasks</div>
        <div class="tasks-stats" id="tasksStats">0 tasks</div>
      </div>
    </div>
    <div class="task-input-row">
      <input class="task-input" type="text" id="taskInput" placeholder="Add a new task and press Enter..."
        onkeydown="if(event.key==='Enter') addTask()"/>
      <button class="task-add-btn" onclick="addTask()">+ ADD TASK</button>
    </div>
    <div class="tasks-filter-row">
      <button class="filter-btn active" onclick="setTaskFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setTaskFilter('open', this)">Open</button>
      <button class="filter-btn" onclick="setTaskFilter('done', this)">Done</button>
    </div>
    <div class="task-list" id="taskList"></div>
  </div>

  <!-- STRATEGY PAGE -->
  <div class="page" id="page-strategy">
    <!-- Password Gate -->
    <div id="strategyGate">
      <div class="gate-wrap">
        <div class="gate-icon">🔒</div>
        <h2 class="gate-title">Strategy Notes</h2>
        <p class="gate-sub">This section is password protected.</p>
        <div class="gate-input-row">
          <input type="password" id="gatePassword" class="gate-input" placeholder="Enter password..."
            onkeydown="if(event.key==='Enter') checkPassword()"/>
          <button class="task-add-btn" onclick="checkPassword()">UNLOCK</button>
        </div>
        <div class="gate-error" id="gateError"></div>
      </div>
    </div>
    <!-- Strategy Content (hidden until unlocked) -->
    <div id="strategyContent" style="display:none">
      <div class="tasks-header">
        <div>
          <div class="tasks-title">Strategy Notes</div>
          <div class="tasks-stats">Private · Session only</div>
        </div>
        <button class="refresh-btn" onclick="addNote()">+ ADD NOTE</button>
      </div>
      <div id="notesList" class="task-list"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>+ New Campaign</h2>
    <label>Campaign ID</label>
    <input type="text" id="newId" placeholder="e.g. 004"/>
    <label>Campaign Name</label>
    <input type="text" id="newName" placeholder="e.g. Summer Retargeting"/>
    <label>Status</label>
    <select id="newStatus">
      <option>Live</option><option>Paused</option><option>Ended</option>
    </select>
    <label>Notes</label>
    <textarea id="newNotes" placeholder="Optional notes..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="modalSaveBtn" onclick="addCampaign()">Add Campaign</button>
    </div>
  </div>
</div>

<script>
  const API = "https://script.google.com/macros/s/AKfycbzC7CO8g97fNI7h-Zbc2Vf43rM7iLdsaMXwOuXtsh6mWQpycz_0baJEktMWFrQfLH-s/exec";
  let campaigns = [], currentFilter = 'all', secondsLeft = 60, taskFilter = 'all';

  // NAV
  function showPage(name, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    btn.classList.add('active');
    document.getElementById('campaignControls').style.display = name === 'campaigns' ? 'flex' : 'none';
    if (name === 'tasks') renderTasks();
    if (name === 'strategy') {
      if (strategyUnlocked) {
        document.getElementById('strategyGate').style.display = 'none';
        document.getElementById('strategyContent').style.display = 'block';
        renderNotes();
      } else {
        document.getElementById('strategyGate').style.display = 'block';
        document.getElementById('strategyContent').style.display = 'none';
        setTimeout(() => document.getElementById('gatePassword').focus(), 100);
      }
    }
  }

  // UTILS
  function formatDate(val) {
    if (!val) return '—';
    const d = new Date(val);
    if (isNaN(d.getTime())) return val;
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // CAMPAIGNS
  function manualRefresh() { secondsLeft = 60; loadCampaigns(); }

  setInterval(() => {
    secondsLeft--;
    if (secondsLeft <= 0) secondsLeft = 60;
    const el = document.getElementById('countdown');
    if (el) el.textContent = `next sync in ${secondsLeft}s`;
  }, 1000);

  setInterval(loadCampaigns, 60000);

  async function loadCampaigns() {
    document.getElementById('tableBody').innerHTML =
      `<tr class="loading-row"><td colspan="5"><div class="spinner"></div><br/>Loading campaigns...</td></tr>`;
    try {
      const res = await fetch(API);
      const json = await res.json();
      campaigns = json.data || [];
      updateStats();
      renderTable();
      document.getElementById('lastSync').innerHTML =
        'Synced ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) +
        `<span class="countdown" id="countdown">next sync in ${secondsLeft}s</span>`;
    } catch {
      document.getElementById('tableBody').innerHTML =
        `<tr class="empty-row"><td colspan="5">⚠ Could not load data.</td></tr>`;
    }
  }

  function updateStats() {
    document.getElementById('countLive').textContent = campaigns.filter(c => c.Status === 'Live').length;
    document.getElementById('countPaused').textContent = campaigns.filter(c => c.Status === 'Paused').length;
    document.getElementById('countEnded').textContent = campaigns.filter(c => c.Status === 'Ended').length;
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('#page-campaigns .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  }

  function renderTable() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    let filtered = campaigns.filter(c => {
      const matchFilter = currentFilter === 'all' || c.Status === currentFilter;
      const matchSearch = !search ||
        (c['Campaign Name']||'').toLowerCase().includes(search) ||
        (c['Campaign ID']||'').toLowerCase().includes(search);
      return matchFilter && matchSearch;
    });

    if (filtered.length === 0) {
      document.getElementById('tableBody').innerHTML =
        `<tr class="empty-row"><td colspan="5">No campaigns found.</td></tr>
         <tr class="add-row"><td colspan="5"><button class="add-btn" onclick="openModal()">+ Add Campaign</button></td></tr>`;
      return;
    }

    document.getElementById('tableBody').innerHTML = filtered.map((c, i) => `
      <tr style="animation-delay:${i*0.04}s">
        <td class="campaign-id">${c['Campaign ID']||'—'}</td>
        <td class="campaign-name">${c['Campaign Name']||'—'}</td>
        <td>
          <div class="status-wrap">
            <span class="status-dot ${(c.Status||'').toLowerCase()}"></span>
            <select class="status-select" data-row="${c._row}" onchange="updateStatus(this)">
              <option ${c.Status==='Live'?'selected':''}>Live</option>
              <option ${c.Status==='Paused'?'selected':''}>Paused</option>
              <option ${c.Status==='Ended'?'selected':''}>Ended</option>
            </select>
          </div>
        </td>
        <td><input class="notes-input" type="text" value="${escapeHtml(c.Notes||'')}"
          data-row="${c._row}" placeholder="Add note..."
          onblur="updateNotes(this)" onkeydown="if(event.key==='Enter')this.blur()"/></td>
        <td class="updated-cell">${formatDate(c['Last Updated'])}</td>
      </tr>`).join('') +
      `<tr class="add-row"><td colspan="5"><button class="add-btn" onclick="openModal()">+ Add Campaign</button></td></tr>`;
  }

  async function updateStatus(select) {
    const row = select.dataset.row, status = select.value;
    select.closest('.status-wrap').querySelector('.status-dot').className = 'status-dot ' + status.toLowerCase();
    showIndicator('saving', '◌ Saving...');
    try {
      await fetch(API, { method: 'POST', body: JSON.stringify({ row: parseInt(row), status }) });
      const c = campaigns.find(c => c._row == row);
      if (c) { c.Status = status; c['Last Updated'] = new Date().toLocaleString(); }
      updateStats(); renderTable(); showIndicator('saved', '✓ Saved');
    } catch { showIndicator('error', '✕ Error'); }
  }

  async function updateNotes(input) {
    const row = input.dataset.row, notes = input.value;
    showIndicator('saving', '◌ Saving...');
    try {
      await fetch(API, { method: 'POST', body: JSON.stringify({ row: parseInt(row), notes }) });
      const c = campaigns.find(c => c._row == row);
      if (c) c.Notes = notes;
      showIndicator('saved', '✓ Saved');
    } catch { showIndicator('error', '✕ Error'); }
  }

  function showIndicator(type, text) {
    const el = document.getElementById('saveIndicator');
    el.className = 'save-indicator ' + type; el.textContent = text;
    if (type !== 'saving') setTimeout(() => { el.className = 'save-indicator'; }, 2500);
  }

  function openModal() { document.getElementById('modalOverlay').classList.add('open'); document.getElementById('newId').focus(); }
  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    ['newId','newName','newNotes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('newStatus').value = 'Live';
  }

  async function addCampaign() {
    const id = document.getElementById('newId').value.trim();
    const name = document.getElementById('newName').value.trim();
    const status = document.getElementById('newStatus').value;
    const notes = document.getElementById('newNotes').value.trim();
    if (!name) { document.getElementById('newName').focus(); return; }
    const btn = document.getElementById('modalSaveBtn');
    btn.disabled = true; btn.textContent = 'Adding...';
    try {
      await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'add', id, name, status, notes }) });
      closeModal(); await loadCampaigns();
    } catch { showIndicator('error', '✕ Error adding'); }
    btn.disabled = false; btn.textContent = 'Add Campaign';
  }

  document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

  // TASKS
  function loadTasks() { try { return JSON.parse(localStorage.getItem('tf_tasks') || '[]'); } catch { return []; } }
  function saveTasks(t) { localStorage.setItem('tf_tasks', JSON.stringify(t)); }

  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) return;
    const tasks = loadTasks();
    tasks.unshift({ id: Date.now(), text, done: false, created: new Date().toISOString() });
    saveTasks(tasks); input.value = ''; renderTasks();
  }

  function toggleTask(id) {
    const tasks = loadTasks();
    const t = tasks.find(t => t.id === id);
    if (t) t.done = !t.done;
    saveTasks(tasks); renderTasks();
  }

  function deleteTask(id) { saveTasks(loadTasks().filter(t => t.id !== id)); renderTasks(); }

  function setTaskFilter(filter, btn) {
    taskFilter = filter;
    document.querySelectorAll('#page-tasks .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); renderTasks();
  }

  function renderTasks() {
    const tasks = loadTasks();
    const done = tasks.filter(t => t.done).length;
    document.getElementById('tasksStats').textContent = `${tasks.length} task${tasks.length !== 1 ? 's' : ''} · ${done} completed`;
    let filtered = tasks;
    if (taskFilter === 'open') filtered = tasks.filter(t => !t.done);
    if (taskFilter === 'done') filtered = tasks.filter(t => t.done);
    const list = document.getElementById('taskList');
    if (filtered.length === 0) { list.innerHTML = `<div class="tasks-empty">No tasks here yet.</div>`; return; }
    list.innerHTML = filtered.map((t, i) => `
      <div class="task-item ${t.done?'done':''}" style="animation-delay:${i*0.04}s">
        <div class="task-check" onclick="toggleTask(${t.id})">${t.done?'✓':''}</div>
        <div class="task-text">${escapeHtml(t.text)}</div>
        <div class="task-date">${formatDate(t.created)}</div>
        <button class="task-delete" onclick="deleteTask(${t.id})">✕</button>
      </div>`).join('');
  }

  // STRATEGY
  const STRATEGY_PASSWORD = 'twofeeds2026'; // ← change this to your password
  let strategyUnlocked = false;

  function checkPassword() {
    const val = document.getElementById('gatePassword').value;
    if (val === STRATEGY_PASSWORD) {
      strategyUnlocked = true;
      document.getElementById('strategyGate').style.display = 'none';
      document.getElementById('strategyContent').style.display = 'block';
      renderNotes();
    } else {
      const err = document.getElementById('gateError');
      err.textContent = 'Incorrect password. Try again.';
      document.getElementById('gatePassword').value = '';
      document.getElementById('gatePassword').focus();
      setTimeout(() => { err.textContent = ''; }, 3000);
    }
  }

  function loadNotes() { try { return JSON.parse(localStorage.getItem('tf_notes') || '[]'); } catch { return []; } }
  function saveNotes(n) { localStorage.setItem('tf_notes', JSON.stringify(n)); }

  function addNote() {
    const notes = loadNotes();
    notes.unshift({ id: Date.now(), title: '', body: '', created: new Date().toISOString() });
    saveNotes(notes); renderNotes();
    // Focus new note title
    setTimeout(() => { const t = document.querySelector('.note-title'); if(t) t.focus(); }, 50);
  }

  function updateNote(id, field, value) {
    const notes = loadNotes();
    const n = notes.find(n => n.id === id);
    if (n) { n[field] = value; n.updated = new Date().toISOString(); }
    saveNotes(notes);
    // Show saved indicator
    const indicator = document.getElementById('saved-' + id);
    if (indicator) {
      indicator.classList.add('show');
      setTimeout(() => indicator.classList.remove('show'), 1500);
    }
  }

  function deleteNote(id) { saveNotes(loadNotes().filter(n => n.id !== id)); renderNotes(); }

  function renderNotes() {
    const notes = loadNotes();
    const list = document.getElementById('notesList');
    if (notes.length === 0) {
      list.innerHTML = `<div class="tasks-empty">No notes yet. Click + ADD NOTE to start.</div>`;
      return;
    }
    list.innerHTML = notes.map((n, i) => `
      <div class="note-item" style="animation-delay:${i*0.04}s">
        <div class="note-title-row">
          <input class="note-title" type="text" value="${escapeHtml(n.title)}"
            placeholder="Note title..."
            onblur="updateNote(${n.id}, 'title', this.value)"/>
          <button class="task-delete" style="opacity:1" onclick="deleteNote(${n.id})">✕</button>
        </div>
        <textarea class="note-body" placeholder="Write your strategy notes here..."
          onblur="updateNote(${n.id}, 'body', this.value)">${escapeHtml(n.body)}</textarea>
        <div class="note-date">${formatDate(n.updated || n.created)}</div>
        <div class="note-saved" id="saved-${n.id}">✓ Saved</div>
      </div>`).join('');
  }

  // INIT
  loadCampaigns();
  renderTasks();
</script>
</body>
</html>
